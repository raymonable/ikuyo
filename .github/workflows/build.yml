name: ikuyo-cross-platform-build

on:
  push:
    paths:
      - '**.c'
      - '**.h'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-msvc-x64:
    runs-on: windows-latest
    env:
      IKUYO_ARCHITECTURE_MSVC: x64
      IKUYO_ARCHITECTURE_NAME: x86_64
      IKUYO_ARCHITECTURE_CROSS: x64
    steps: &build-msvc
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      
      - name: Pull Latest MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: ${{ env.IKUYO_ARCHITECTURE_CROSS }}

      - name: Build using CMake
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A ${{ env.IKUYO_ARCHITECTURE_MSVC }}
          cmake --build build --config Release
          ren "./bin/Release" "ikuyo-windows"

      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: 'ikuyo-windows-${{ env.IKUYO_ARCHITECTURE_NAME }}'
          path: './bin/ikuyo-windows'
          
  build-linux-x64:
    runs-on: ubuntu-latest
    env:
      IKUYO_ARCHITECTURE_APT: x86-64
      IKUYO_ARCHITECTURE_GCC: x86_64
      IKUYO_ARCHITECTURE_NAME: x86_64
    steps: &build-gcc
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-${{ env.IKUYO_ARCHITECTURE_APT }}-linux-gnu g++-${{ env.IKUYO_ARCHITECTURE_APT }}-linux-gnu

      - name: Build with CMake
        run: |
          cmake -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=${{ env.IKUYO_ARCHITECTURE_GCC }} \
            -DCMAKE_C_COMPILER=${{ env.IKUYO_ARCHITECTURE_GCC }}-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=${{ env.IKUYO_ARCHITECTURE_GCC }}-linux-gnu-g++ \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          mkdir ikuyo-linux
          mv bin/* ikuyo-linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: 'ikuyo-linux-${{ env.IKUYO_ARCHITECTURE_NAME }}'
          path: './ikuyo-linux'

  # Define additional platforms to build for below

  build-msvc-arm64:
    runs-on: windows-latest
    env:
      IKUYO_ARCHITECTURE_MSVC: ARM64
      IKUYO_ARCHITECTURE_NAME: arm64
      IKUYO_ARCHITECTURE_CROSS: amd64_arm64
    steps: *build-msvc
    
  build-linux-arm64:
    runs-on: ubuntu-latest
    env:
      IKUYO_ARCHITECTURE_APT: aarch64
      IKUYO_ARCHITECTURE_NAME: arm64
      IKUYO_ARCHITECTURE_GCC: aarch64
    steps: *build-gcc
